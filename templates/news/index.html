<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Digest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .news-card { transition: transform 0.2s ease-in-out; }
        .news-card:hover { transform: translateY(-5px); }
        .tab-active { border-bottom: 2px solid #3B82F6; color: #3B82F6; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Text clarity improvements */
        .article-title {
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            word-break: break-word;
        }
        .article-summary {
            color: #4b5563;
            font-size: 0.95rem;
        }
        /* Mobile responsive adjustments */
        @media (max-width: 639px) {
            main {
                padding-top: 4.5rem;
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
            #pageTitle {
                font-size: 1.5rem;
                line-height: 2rem;
            }
            #pageSubTitle {
                font-size: 0.875rem;
            }
        }
        @media (min-width: 640px) {
            main {
                padding-top: 6rem;
            }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-md fixed w-full z-10 top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="loadHome()">
                    <i class="fas fa-newspaper text-blue-600 text-2xl mr-2"></i>
                    <span class="font-bold text-xl tracking-tight text-gray-900">AI News</span>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:flex space-x-4 items-center">
                    <a href="#" onclick="loadCategory('')" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Home</a>
                    <a href="#" onclick="loadCategory('technology')" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Technology</a>
                    <a href="#" onclick="loadCategory('business')" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Business</a>
                    <a href="#" onclick="loadCategory('sports')" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Sports</a>
                    <a href="#" onclick="loadCategory('health')" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Health</a>
                    <a href="#" onclick="loadBookmarks()" class="text-red-500 hover:text-red-600 px-3 py-2 rounded-md font-medium"><i class="fas fa-bookmark mr-1"></i>Bookmarks</a>
                </div>

                <!-- Search and Tools -->
                <div class="flex items-center space-x-3">
                    <div class="relative hidden sm:flex items-center">
                        <input type="text" id="searchInput" placeholder="Search news..." class="w-full bg-gray-100 rounded-full py-1.5 px-4 pl-10 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                        <button id="voiceBtn" onclick="startVoiceSearch()" type="button" class="absolute right-3 top-2.5 text-blue-600 hover:text-blue-800 text-sm" title="Search by voice">
                            <i class="fas fa-microphone"></i>
                        </button>
                    </div>
                </div>

                <!-- Mobile menu button -->
                <div class="flex items-center md:hidden gap-2">
                    <button id="mobileSearchToggle" class="text-gray-600 hover:text-gray-900 focus:outline-none p-2">
                        <i class="fas fa-search text-xl"></i>
                    </button>
                    <button id="mobileMenuBtn" class="text-gray-600 hover:text-gray-900 focus:outline-none p-2">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Search Panel -->
    <div id="mobileSearchPanel" class="md:hidden bg-white border-b border-gray-200 fixed w-full top-16 left-0 right-0 z-9 hidden p-4">
        <div class="relative flex items-center">
            <input type="text" id="mobileSearchInput" placeholder="Search news..." class="w-full bg-gray-100 rounded-full py-2 px-4 pl-10 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
            <button onclick="startVoiceSearch()" type="button" class="absolute right-3 text-blue-600 hover:text-blue-800" title="Search by voice">
                <i class="fas fa-microphone"></i>
            </button>
        </div>
        <script>
            document.getElementById('mobileSearchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchNews(this.value);
                    document.getElementById('mobileSearchPanel').classList.add('hidden');
                }
            });
        </script>
    </div>

    <!-- Mobile Category Menu -->
    <div id="mobileCategoryMenu" class="md:hidden bg-white border-b border-gray-200 fixed w-full top-16 left-0 right-0 z-9 hidden max-h-96 overflow-y-auto">
        <button onclick="loadHome()" class="w-full text-left px-4 py-3 text-gray-700 hover:bg-blue-50 border-b border-gray-100">
            <i class="fas fa-home mr-2"></i> Home
        </button>
        <button onclick="loadCategory('technology')" class="w-full text-left px-4 py-3 text-gray-700 hover:bg-blue-50 border-b border-gray-100">
            <i class="fas fa-laptop mr-2"></i> Technology
        </button>
        <button onclick="loadCategory('business')" class="w-full text-left px-4 py-3 text-gray-700 hover:bg-blue-50 border-b border-gray-100">
            <i class="fas fa-briefcase mr-2"></i> Business
        </button>
        <button onclick="loadCategory('sports')" class="w-full text-left px-4 py-3 text-gray-700 hover:bg-blue-50 border-b border-gray-100">
            <i class="fas fa-football-ball mr-2"></i> Sports
        </button>
        <button onclick="loadCategory('health')" class="w-full text-left px-4 py-3 text-gray-700 hover:bg-blue-50 border-b border-gray-100">
            <i class="fas fa-heartbeat mr-2"></i> Health
        </button>
        <button onclick="loadBookmarks()" class="w-full text-left px-4 py-3 text-red-500 hover:bg-red-50">
            <i class="fas fa-bookmark mr-2"></i> Bookmarks
        </button>
    </div>

        </nav>
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 pt-20 sm:pt-24 pb-12">
        
        <!-- Flash Message / Initial Loader Trigger -->
        <div class="mb-6">
            <div class="mb-4">
                <h1 id="pageTitle" class="text-2xl sm:text-3xl font-bold text-gray-900">Top Headlines</h1>
                <p id="pageSubTitle" class="text-gray-500 mt-1 text-sm">Your daily intelligent news digest displaying the top 10 trending headlines</p>
            </div>
            
            <!-- Controls - Desktop (640px and up) -->
            <div class="hidden sm:flex flex-wrap items-center gap-2">
                <select id="langSelect" onchange="translatePage()" class="bg-white border border-gray-300 text-gray-700 py-1.5 px-3 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm">
                    <option value="en">🌐 English</option>
                    <option value="hi">🇮🇳 Hindi</option>
                    <option value="te">🇮🇳 Telugu</option>
                </select>

                <select id="voiceLangSelect" class="bg-white border border-gray-300 text-gray-700 py-1.5 px-3 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm" title="Speech recognition language">
                    <option value="en-US">🎤 EN (US)</option>
                    <option value="hi-IN">🎤 HI (IN)</option>
                    <option value="te-IN">🎤 TE (IN)</option>
                </select>

                <button id="ttsBtn" onclick="speakHeadlines()" class="bg-green-600 hover:bg-green-700 text-white py-1.5 px-3 rounded-md shadow-sm text-sm font-medium transition duration-150" title="Read headlines aloud">
                    <i class="fas fa-volume-up mr-1"></i> Read
                </button>
                <button id="ttsStopBtn" onclick="stopSpeech()" class="bg-red-500 hover:bg-red-600 text-white py-1.5 px-3 rounded-md shadow-sm text-sm font-medium transition duration-150" title="Stop reading">
                    <i class="fas fa-stop mr-1"></i> Stop
                </button>

                <input id="dateSelect" type="date" class="bg-white border border-gray-300 text-gray-700 py-1.5 px-3 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm" onchange="loadDailyNews()" />
                <button id="clearDateBtn" onclick="clearDateFilter()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 py-1.5 px-3 rounded-md shadow-sm text-sm transition duration-150">
                    Clear Date
                </button>

                <button onclick="forceFetch()" class="bg-blue-600 hover:bg-blue-700 text-white py-1.5 px-3 rounded-md shadow-sm text-sm font-medium transition duration-150" title="Refresh news">
                    <i class="fas fa-sync-alt mr-1"></i> Refresh
                </button>
            </div>

            <!-- Controls - Mobile (under 640px) -->
            <div class="sm:hidden grid grid-cols-2 gap-2">
                <div class="col-span-2 flex gap-2">
                    <button id="ttsBtnMobile" onclick="speakHeadlines()" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-2 px-2 rounded-md shadow-sm text-xs font-medium transition duration-150" title="Read">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button id="ttsStopBtnMobile" onclick="stopSpeech()" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 px-2 rounded-md shadow-sm text-xs font-medium transition duration-150" title="Stop">
                        <i class="fas fa-stop"></i>
                    </button>
                    <button onclick="forceFetch()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 px-2 rounded-md shadow-sm text-xs font-medium transition duration-150" title="Refresh">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>

                <select id="langSelectMobile" onchange="translatePage()" class="bg-white border border-gray-300 text-gray-700 py-2 px-2 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-xs">
                    <option value="en">🌐 English</option>
                    <option value="hi">🇮🇳 Hindi</option>
                    <option value="te">🇮🇳 Telugu</option>
                </select>

                <input id="dateSelectMobile" type="date" class="bg-white border border-gray-300 text-gray-700 py-2 px-2 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-xs" onchange="loadDailyNews()" />
            </div>
        </div>

        <!-- Trending Section (Only on Home) -->
        <div id="trendingSection" class="mb-12">
            <h2 class="text-2xl font-bold text-gray-900 mb-4 border-l-4 border-blue-500 pl-3">Trending Now</h2>
            <div id="trendingContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                <!-- Trending cards will be injected here -->
            </div>
        </div>

        <!-- Main News Feed -->
        <div class="mb-8 flex justify-between items-center border-b border-gray-200 pb-4">
            <h2 id="feedTitle" class="text-2xl font-bold text-gray-900">Latest Updates</h2>
        </div>

        <div id="loader" class="flex justify-center my-12 hidden">
            <div class="loader"></div>
        </div>

        <div id="newsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8">
            <!-- News cards will be injected here -->
        </div>
        
    </main>

    <!-- Article Modal -->
    <div id="articleModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="closeModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all w-full sm:my-8 sm:align-middle sm:max-w-4xl">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="sm:flex sm:items-start flex-col sm:flex-row">
                        <div class="mt-3 text-left sm:mt-0 sm:ml-4 w-full">
                            <div class="flex justify-between items-start mb-4 flex-wrap gap-2">
                                <div class="flex items-center space-x-2 flex-wrap">
                                    <h3 class="text-xl sm:text-3xl leading-tight font-bold text-gray-900" id="modalTitle">Article Title</h3>
                                    <button id="modalTtsBtn" onclick="speakModalArticle()" class="bg-blue-600 hover:bg-blue-700 text-white px-2 sm:px-3 py-1 rounded-md text-xs sm:text-sm font-medium focus:outline-none whitespace-nowrap" title="Read article aloud">
                                        <i class="fas fa-volume-up"></i>
                                    </button>
                                </div>
                                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-500 focus:outline-none flex-shrink-0">
                                    <i class="fas fa-times text-2xl"></i>
                                </button>
                            </div>
                            <img id="modalImage" src="" alt="" class="w-full h-40 sm:h-80 object-cover rounded-xl mb-6 shadow-md">
                            <div class="flex items-center space-x-2 sm:space-x-4 mb-6 text-xs sm:text-sm text-gray-500 flex-wrap">
                                <span id="modalSource" class="font-bold text-blue-600 uppercase tracking-widest">SOURCE</span>
                                <span id="modalDate"><i class="far fa-calendar-alt mr-1"></i> DATE</span>
                                <span id="modalCategory" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-xs font-bold">CATEGORY</span>
                            </div>
                            <div id="modalContent" class="text-gray-800 text-base sm:text-lg leading-relaxed space-y-4 prose prose-sm sm:prose max-w-none">
                                <!-- Rewritten content goes here -->
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse flex-col-reverse">
                    <button type="button" onclick="closeModal()" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">
                        Close
                    </button>
                    <a id="modalOriginalLink" href="#" target="_blank" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                        View Original Source
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global State
        let currentCategory = '';
        let currentDateFilter = '';
        let currentLanguage = 'en';
        let currentArticles = [];
        let bookmarkedUrls = JSON.parse(localStorage.getItem('bookmarks')) || [];
        let lastFetchTime = Date.now();
        const translationCache = {}; // {"<id>_<lang>": {title, summary}}


        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search');
            
            if (searchQuery) {
                searchNews(searchQuery);
            } else {
                loadHome();
            }
            
            // Search setup - Desktop
            document.getElementById('searchInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    searchNews(this.value);
                }
            });

            // Mobile menu toggle
            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                const menu = document.getElementById('mobileCategoryMenu');
                const searchPanel = document.getElementById('mobileSearchPanel');
                menu.classList.toggle('hidden');
                searchPanel.classList.add('hidden');
            });

            // Mobile search toggle
            document.getElementById('mobileSearchToggle').addEventListener('click', () => {
                const searchPanel = document.getElementById('mobileSearchPanel');
                const menu = document.getElementById('mobileCategoryMenu');
                searchPanel.classList.toggle('hidden');
                menu.classList.add('hidden');
            });

            // Sync mobile language select with desktop
            const langSelectDesktop = document.getElementById('langSelect');
            const langSelectMobile = document.getElementById('langSelectMobile');
            
            if (langSelectMobile) {
                langSelectMobile.addEventListener('change', function() {
                    if (langSelectDesktop) langSelectDesktop.value = this.value;
                    translatePage();
                });
            }

            if (langSelectDesktop) {
                langSelectDesktop.addEventListener('change', function() {
                    if (langSelectMobile) langSelectMobile.value = this.value;
                });
            }

            // Sync mobile date select with desktop
            const dateSelectDesktop = document.getElementById('dateSelect');
            const dateSelectMobile = document.getElementById('dateSelectMobile');
            
            if (dateSelectMobile) {
                dateSelectMobile.addEventListener('change', function() {
                    if (dateSelectDesktop) dateSelectDesktop.value = this.value;
                    loadDailyNews();
                });
            }

            if (dateSelectDesktop) {
                dateSelectDesktop.addEventListener('change', function() {
                    if (dateSelectMobile) dateSelectMobile.value = this.value;
                });
            }

            // Set up auto-refresh polling (every 5 minutes)
            setInterval(() => {
                console.log("Auto-trigger: Checking for new articles...");
                if (!currentCategory && !document.getElementById('searchInput').value) {
                    loadHome(); 
                }
            }, 300000); // 5 minutes

            // Close mobile menus when clicking on main content
            document.getElementById('newsContainer').addEventListener('click', () => {
                document.getElementById('mobileSearchPanel').classList.add('hidden');
                document.getElementById('mobileCategoryMenu').classList.add('hidden');
            });
        });

        // Toggle Loader
        function toggleLoader(show) {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        async function forceFetch() {
            try {
                toggleLoader(true);
                const response = await fetch('/api/force-fetch/', { method: 'POST' });
                if(response.ok) {
                    alert("News background sync triggered successfully!");
                    loadHome();
                }
            } catch (err) {
                console.error(err);
                alert("Error fetching news");
            } finally {
                toggleLoader(false);
            }
        }

        async function loadHome() {
            currentCategory = '';
            currentDateFilter = '';
            document.getElementById('dateSelect').value = '';
            document.getElementById('pageTitle').innerText = 'Top Headlines';
            document.getElementById('pageSubTitle').innerText = 'Your daily intelligent news digest displaying the top 10 trending headlines';
            document.getElementById('trendingSection').style.display = 'block';
            await loadTrending();
            await fetchArticles('/api/articles/');
        }

        async function loadCategory(cat) {
            currentCategory = cat;
            currentDateFilter = '';
            document.getElementById('dateSelect').value = '';
            document.getElementById('trendingSection').style.display = 'none';
            document.getElementById('pageTitle').innerText = cat ? cat.charAt(0).toUpperCase() + cat.slice(1) + ' News' : 'Latest News';
            const url = cat ? `/api/articles/?category=${cat}` : '/api/articles/';
            await fetchArticles(url);
        }

        async function loadDailyNews() {
            const selectedDate = document.getElementById('dateSelect').value;
            currentDateFilter = selectedDate;
            if (!selectedDate) {
                loadHome();
                return;
            }

            document.getElementById('trendingSection').style.display = 'none';
            document.getElementById('pageTitle').innerText = `News for ${selectedDate}`;
            document.getElementById('pageSubTitle').innerText = `Showing articles published on ${selectedDate}`;

            const dateQuery = `date=${selectedDate}`;
            const catQuery = currentCategory ? `&category=${currentCategory}` : '';
            await fetchArticles(`/api/articles/?${dateQuery}${catQuery}`);
        }

        function clearDateFilter() {
            currentDateFilter = '';
            document.getElementById('dateSelect').value = '';
            document.getElementById('dateSelectMobile').value = '';
            loadHome();
        }

        async function searchNews(query) {
            currentDateFilter = '';
            document.getElementById('dateSelect').value = '';
            document.getElementById('trendingSection').style.display = 'none';
            document.getElementById('pageTitle').innerText = 'Search Results';
            document.getElementById('pageSubTitle').innerText = `Showing results for "${query}"`;
            await fetchArticles(`/api/articles/?search=${query}`);
        }

        function loadBookmarks() {
            document.getElementById('trendingSection').style.display = 'none';
            document.getElementById('pageTitle').innerText = 'Your Bookmarks';
            document.getElementById('pageSubTitle').innerText = 'Saved articles for later reading';
            
            const bookmarkedArticles = currentArticles.filter(a => bookmarkedUrls.includes(a.original_url));
            if(bookmarkedArticles.length > 0) {
                renderArticles(bookmarkedArticles, 'newsContainer');
            } else {
                fetchArticles('/api/articles/').then(() => {
                    const bArt = currentArticles.filter(a => bookmarkedUrls.includes(a.original_url));
                    renderArticles(bArt, 'newsContainer');
                });
            }
        }

        async function fetchArticles(url) {
            toggleLoader(true);
            try {
                const response = await fetch(url);
                const data = await response.json();
                const articles = Array.isArray(data) ? data : (data.results || []);
                currentArticles = articles;

                if (articles.length === 0) {
                    document.getElementById('newsContainer').innerHTML = '<p class="text-gray-500 font-medium text-center col-span-full">No news available right now. Please refresh or come back later.</p>';
                } else {
                    renderArticles(currentArticles, 'newsContainer');
                    translatePage();
                }
            } catch (error) {
                console.error('Error fetching articles:', error);
                document.getElementById('newsContainer').innerHTML = '<p class="text-red-500 font-medium text-center">Failed to load news. Please try again later.</p>';
            } finally {
                toggleLoader(false);
            }
        }

        async function loadTrending() {
            try {
                const response = await fetch('/api/trending/');
                const data = await response.json();
                const articles = Array.isArray(data) ? data : (data.results || []);

                if (articles.length === 0) {
                    document.getElementById('trendingContainer').innerHTML = '<p class="text-gray-500 text-center col-span-full">No trending articles available right now.</p>';
                    return;
                }

                renderArticles(articles, 'trendingContainer', true);
            } catch (err) {
                console.error('Error loading trending news:', err);
                document.getElementById('trendingContainer').innerHTML = '<p class="text-red-500 text-center col-span-full">Could not load trending headlines.</p>';
            }
        }

        function toggleBookmark(url) {
            const idx = bookmarkedUrls.indexOf(url);
            if (idx > -1) {
                bookmarkedUrls.splice(idx, 1);
            } else {
                bookmarkedUrls.push(url);
            }
            localStorage.setItem('bookmarks', JSON.stringify(bookmarkedUrls));
            renderArticles(currentArticles, 'newsContainer');
        }

        function openArticle(id) {
            const article = currentArticles.find(a => a.id == id);
            if (!article) return;

            document.getElementById('modalTitle').innerText = decodeHtmlEntities(article.title);
            document.getElementById('modalImage').src = article.image_url || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&q=80&w=800';
            document.getElementById('modalSource').innerText = article.source || 'AI NEWS';
            document.getElementById('modalCategory').innerText = article.category_name || 'GENERAL';
            document.getElementById('modalDate').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> ${new Date(article.published_date).toLocaleString()}`;
            
            // Format rewritten content into paragraphs with better readability
            const content = article.content || article.description || "Content is being generated...";
            const decodedContent = decodeHtmlEntities(content);
            const formattedContent = decodedContent.split('\n').filter(p => p.trim() !== '').map(p => `<p class="mb-4 text-gray-800 leading-relaxed">${p}</p>`).join('');
            document.getElementById('modalContent').innerHTML = formattedContent;
            document.getElementById('modalOriginalLink').href = article.original_url;
            
            document.getElementById('articleModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('articleModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function decodeHtmlEntities(text) {
            if (!text) return '';
            const textarea = document.createElement('textarea');
            textarea.innerHTML = text;
            const decoded = textarea.value;
            // Clean up extra whitespace
            return decoded.replace(/\s+/g, ' ').trim();
        }

        function renderArticles(articles, targetId, isTrending = false) {
            const container = document.getElementById(targetId);
            container.innerHTML = '';

            if(articles.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center col-span-full">No articles found in this section.</p>';
                return;
            }

            articles.forEach(article => {
                const isBookmarked = bookmarkedUrls.includes(article.original_url);
                const bookmarkIcon = isBookmarked ? 'fas fa-bookmark text-red-500' : 'far fa-bookmark text-gray-400';
                
                const category = (article.category_name || 'GENERAL').toUpperCase();
                const fallbackImages = {
                    'TECHNOLOGY': 'https://images.unsplash.com/photo-1485827404703-89b55fcc595e',
                    'BUSINESS': 'https://images.unsplash.com/photo-1460925895917-afdab827c52f',
                    'SPORTS': 'https://images.unsplash.com/photo-1508098682722-e99c43a406b2',
                    'HEALTH': 'https://images.unsplash.com/photo-1505751172876-fa1923c5c528',
                    'ENTERTAINMENT': 'https://images.unsplash.com/photo-1514525253361-bee8718a7439',
                    'WORLD': 'https://images.unsplash.com/photo-1521295121783-8a321d551ad2'
                };
                const defaultImage = fallbackImages[category] || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c';
                const imageUrl = article.image_url && article.image_url !== "" ? article.image_url : `${defaultImage}?auto=format&fit=crop&q=80&w=800&sig=${article.id}`;
                
                const pubDate = new Date(article.published_date);
                const diffMs = new Date() - pubDate;
                const diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
                const diffMins = Math.floor(diffMs / (1000 * 60));
                
                let timeStr = pubDate.toLocaleDateString();
                if (diffHrs < 24 && diffHrs > 0) timeStr = `${diffHrs}h ago`;
                else if (diffHrs === 0) timeStr = `${diffMins}m ago`;
                
                const cardClasses = isTrending ? 
                    "news-card bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-full cursor-pointer hover:shadow-lg" : 
                    "news-card bg-white rounded-xl shadow border border-gray-200 overflow-hidden flex flex-col h-full cursor-pointer hover:shadow-xl";
                
                const titleLength = isTrending ? 60 : 100;
                let shortTitle = decodeHtmlEntities(article.title);
                shortTitle = shortTitle.length > titleLength ? shortTitle.substring(0, titleLength) + '...' : shortTitle;
                
                const summary = decodeHtmlEntities(article.summary || article.description || '');

                const cardHTML = `
                    <div class="${cardClasses}" data-id="${article.id}" onclick="openArticle('${article.id}')">
                        <div class="relative">
                            <img src="${imageUrl}" alt="News Image" class="w-full ${isTrending?'h-32':'h-48'} object-cover" onerror="this.src='${defaultImage}'">
                            <div class="absolute top-2 right-2 bg-white bg-opacity-90 rounded-full p-1.5 cursor-pointer shadow hover:bg-gray-100" onclick="event.stopPropagation(); toggleBookmark('${article.original_url}')">
                                <i class="${bookmarkIcon} text-lg w-6 h-6 flex items-center justify-center"></i>
                            </div>
                        </div>
                        <div class="p-4 flex-grow flex flex-col">
                            <div class="flex items-center text-xs font-bold text-blue-600 mb-2 space-x-2">
                                <span class="bg-blue-100 py-0.5 px-2 rounded-full uppercase truncate mb-1">${article.category_name || 'General'}</span>
                                <span class="text-gray-500 font-normal"><i class="far fa-clock mr-1"></i>${timeStr}</span>
                            </div>
                            <h3 class="font-bold text-gray-900 mb-2 leading-snug ${isTrending?'text-sm':'text-base sm:text-lg'} article-title">${shortTitle}</h3>
                            <p class="text-gray-700 text-sm mb-4 flex-grow line-clamp-3 article-summary leading-relaxed">${isTrending ? '' : summary}</p>
                            
                            <div class="mt-auto flex justify-between items-center border-t border-gray-200 pt-3">
                                <span class="text-xs font-bold text-gray-500 uppercase tracking-wider truncate w-24">${article.source || 'News'}</span>
                                <span class="text-blue-600 hover:text-blue-800 text-sm font-semibold flex items-center">
                                    Read <i class="fas fa-chevron-right ml-1 text-xs"></i>
                                </span>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        async function translatePage() {
            const lang = document.getElementById('langSelect').value;
            currentLanguage = lang;

            const cards = document.querySelectorAll('.news-card');
            if (lang === 'en') {
                cards.forEach(card => {
                    const id = card.getAttribute('data-id');
                    const article = currentArticles.find(a => a.id == id);
                    const titleEl = card.querySelector('.article-title');
                    const summaryEl = card.querySelector('.article-summary');
                    if (!article || !titleEl) return;

                    titleEl.innerText = decodeHtmlEntities(article.title) || '';
                    if (summaryEl) summaryEl.innerText = decodeHtmlEntities(article.summary || article.description) || '';
                    titleEl.classList.remove('translated-to-hi', 'translated-to-te');
                });
                return;
            }

            // Batch translation
            const idsToTranslate = [];
            cards.forEach(card => {
                const id = card.getAttribute('data-id');
                const cacheKey = `${id}_${lang}`;
                if (!translationCache[cacheKey]) {
                    idsToTranslate.push(id);
                    const titleEl = card.querySelector('.article-title');
                    if (titleEl) titleEl.style.opacity = '0.5';
                } else {
                    const cached = translationCache[cacheKey];
                    const titleEl = card.querySelector('.article-title');
                    const summaryEl = card.querySelector('.article-summary');
                    if (titleEl) {
                        titleEl.innerText = cached.title;
                        titleEl.classList.add('translated-to-'+lang);
                    }
                    if (summaryEl && cached.summary) summaryEl.innerText = cached.summary;
                }
            });

            if (idsToTranslate.length === 0) return;

            try {
                // Get CSRF Token if needed for POST, though here we might skip if not enforced
                const response = await fetch(`/api/translate-batch/${lang}/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ ids: idsToTranslate })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    idsToTranslate.forEach(id => {
                        const card = document.querySelector(`.news-card[data-id="${id}"]`);
                        const titleEl = card ? card.querySelector('.article-title') : null;
                        const summaryEl = card ? card.querySelector('.article-summary') : null;
                        
                        const translated = data[id];
                        if (translated && titleEl) {
                            const titleTrans = decodeHtmlEntities(translated.title);
                            const summaryTrans = decodeHtmlEntities(translated.summary);
                            
                            translationCache[`${id}_${lang}`] = {
                                title: titleTrans,
                                summary: summaryTrans
                            };
                            
                            titleEl.innerText = titleTrans;
                            if (summaryEl) summaryEl.innerText = summaryTrans;
                            titleEl.classList.add('translated-to-'+lang);
                        }
                        if (titleEl) titleEl.style.opacity = '1';
                    });
                }
            } catch (e) {
                console.error('Batch translation fail', e);
                idsToTranslate.forEach(id => {
                    const card = document.querySelector(`.news-card[data-id="${id}"]`);
                    const titleEl = card ? card.querySelector('.article-title') : null;
                    if (titleEl) titleEl.style.opacity = '1';
                });
            }
        }

        // Helper to get CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function startVoiceSearch() {
            const recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!recognition) {
                alert('Voice search is not supported in this browser. Please use a Chromium-based browser.');
                return;
            }

            const voiceLang = document.getElementById('voiceLangSelect').value || 'en-US';
            const speech = new recognition();
            speech.lang = voiceLang;
            speech.interimResults = false;
            speech.maxAlternatives = 1;

            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.disabled = true;
            voiceBtn.classList.add('text-gray-400');

            speech.onresult = (event) => {
                const speechText = event.results[0][0].transcript;
                document.getElementById('searchInput').value = speechText;
                searchNews(speechText);
            };

            speech.onerror = (event) => {
                console.error('Speech recognition error', event.error);
                alert('Voice input failed: ' + event.error);
            };

            speech.onend = () => {
                voiceBtn.disabled = false;
                voiceBtn.classList.remove('text-gray-400');
            };

            speech.start();
        }

        function speakHeadlines() {
            if (!('speechSynthesis' in window)) {
                alert('Text-to-speech is not supported in this browser.');
                return;
            }

            if (!currentArticles || currentArticles.length === 0) {
                alert('No headlines available to read.');
                return;
            }

            const lecture = currentArticles.map((article, index) => `Headline ${index + 1}: ${article.title}`).join('. ');
            if (!lecture) {
                alert('No headlines available to read.');
                return;
            }

            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(lecture);
            utterance.lang = currentLanguage === 'en' ? 'en-US' : (currentLanguage === 'hi' ? 'hi-IN' : (currentLanguage === 'te' ? 'te-IN' : 'en-US'));
            utterance.rate = 1.0;
            utterance.pitch = 1.0;

            window.speechSynthesis.speak(utterance);
        }

        function stopSpeech() {
            if (!('speechSynthesis' in window)) {
                return;
            }
            if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
                window.speechSynthesis.cancel();
            }
        }

        function speakModalArticle() {
            if (!('speechSynthesis' in window)) {
                alert('Text-to-speech is not supported in this browser.');
                return;
            }

            const title = document.getElementById('modalTitle').innerText;
            const content = document.getElementById('modalContent').innerText;

            if (!title && !content) {
                alert('No article is loaded in the modal.');
                return;
            }

            const speechText = `Article: ${title}. ${content}`;
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(speechText);
            utterance.lang = currentLanguage === 'en' ? 'en-US' : (currentLanguage === 'hi' ? 'hi-IN' : (currentLanguage === 'te' ? 'te-IN' : 'en-US'));
            utterance.rate = 1.0;
            utterance.pitch = 1.0;

            window.speechSynthesis.speak(utterance);
        }
    </script>
